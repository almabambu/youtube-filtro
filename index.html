<!DOCTYPE html>
<html>
<head>
  <title>Explorador PRO YouTube</title>
</head>
<body>

<h2>Explorador de Nichos PRO</h2>

<!-- FILTROS -->
<input type="number" id="minViews" placeholder="Min views">
<input type="number" id="maxViews" placeholder="Max views">

<input type="number" id="minSubs" placeholder="Min subs">
<input type="number" id="maxSubs" placeholder="Max subs">

<select id="tipo">
  <option value="all">Tipo: Todos</option>
  <option value="short">Shorts (<4min)</option>
  <option value="medium">Medio (4-20min)</option>
  <option value="long">Largo (>20min)</option>
</select>

<select id="idioma">
  <option value="all">Idioma: Todos</option>
  <option value="en">Inglés</option>
  <option value="es">Español</option>
</select>

<select id="fecha">
  <option value="any">Cualquier fecha</option>
  <option value="hour">Última hora</option>
  <option value="today">Hoy</option>
  <option value="week">Semana</option>
  <option value="month">Mes</option>
  <option value="year">Año</option>
</select>

<button onclick="resetBuscar()">Explorar</button>

<div id="results"></div>

<script>
const API_KEY = "AIzaSyAhxReFBVs_RO3x7uWbz8CpMbvYAQdvvzc";

const queries = ["a","e","i","o","u","the","game","music","how","news"];

let nextPageToken = "";
let cargando = false;

function resetBuscar(){
  document.getElementById("results").innerHTML = "";
  nextPageToken = "";
  buscar();
}

async function buscar() {
  if (cargando) return;
  cargando = true;

  document.getElementById("results").innerHTML += "<p>Cargando...</p>";

  let minViews = parseInt(minViewsEl.value) || 0;
  let maxViews = parseInt(maxViewsEl.value) || Infinity;
  let minSubs = parseInt(minSubsEl.value) || 0;
  let maxSubs = parseInt(maxSubsEl.value) || Infinity;
  let tipo = tipoEl.value;
  let idioma = idiomaEl.value;
  let fecha = fechaEl.value;

  let q = queries[Math.floor(Math.random()*queries.length)];

  let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${q}&key=${API_KEY}`;
  if (nextPageToken) url += `&pageToken=${nextPageToken}`;

  let res = await fetch(url);
  let data = await res.json();

  nextPageToken = data.nextPageToken || "";

  let ids = data.items.map(v => v.id.videoId).join(",");

  let resVideos = await fetch(
    `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${ids}&key=${API_KEY}`
  );

  let videos = await resVideos.json();

  let channelIds = videos.items.map(v => v.snippet.channelId).join(",");

  let resChannels = await fetch(
    `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${channelIds}&key=${API_KEY}`
  );

  let channels = await resChannels.json();

  let subsMap = {};
  channels.items.forEach(c=>{
    subsMap[c.id]=parseInt(c.statistics.subscriberCount||0);
  });

  let html = "";

  videos.items.forEach(v=>{
    let views = parseInt(v.statistics.viewCount||0);
    let subs = subsMap[v.snippet.channelId]||0;

    let dur = v.contentDetails.duration;
    let m = dur.match(/PT(\d+H)?(\d+M)?/);
    let h = m[1]?parseInt(m[1]):0;
    let min = m[2]?parseInt(m[2]):0;
    let total = h*60+min;

    let okTipo = true;
    if(tipo==="short") okTipo = total<4;
    if(tipo==="medium") okTipo = total>=4 && total<=20;
    if(tipo==="long") okTipo = total>20;

    let okIdioma = true;
    if(idioma!=="all"){
      okIdioma = v.snippet.defaultAudioLanguage?.startsWith(idioma);
    }

    let okFecha = filtrarFecha(v.snippet.publishedAt,fecha);

    if(
      views>=minViews && views<=maxViews &&
      subs>=minSubs && subs<=maxSubs &&
      okTipo && okIdioma && okFecha
    ){
      html += `
      <div style="margin:20px;">
        <h3>${v.snippet.title}</h3>
        <iframe width="300" height="170"
        src="https://www.youtube.com/embed/${v.id}">
        </iframe>
        <p>👁 ${views} | 👤 ${subs} | ⏱ ${total} min</p>
      </div>`;
    }
  });

  document.getElementById("results").innerHTML += html;

  cargando = false;
}

function filtrarFecha(fecha,tipo){
  if(tipo==="any") return true;

  let now = new Date();
  let f = new Date(fecha);
  let diff = (now-f)/1000;

  if(tipo==="hour") return diff<=3600;
  if(tipo==="today") return diff<=86400;
  if(tipo==="week") return diff<=604800;
  if(tipo==="month") return diff<=2592000;
  if(tipo==="year") return diff<=31536000;

  return true;
}

// SCROLL INFINITO
window.addEventListener("scroll",()=>{
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight-200){
    buscar();
  }
});

// shortcuts elementos
const minViewsEl = document.getElementById("minViews");
const maxViewsEl = document.getElementById("maxViews");
const minSubsEl = document.getElementById("minSubs");
const maxSubsEl = document.getElementById("maxSubs");
const tipoEl = document.getElementById("tipo");
const idiomaEl = document.getElementById("idioma");
const fechaEl = document.getElementById("fecha");

</script>

</body>
</html>
