<!DOCTYPE html>
<html>
<head>
  <title>YouTube Filtro</title>
</head>
<body>

<h2>Filtro de YouTube</h2>

<input type="number" id="minViews" placeholder="Vistas mínimas">
<input type="number" id="minSubs" placeholder="Subs mínimas">

<select id="duration">
  <option value="all">Todos</option>
  <option value="short">Shorts</option>
  <option value="medium">Medio</option>
  <option value="long">Largo</option>
</select>

<button onclick="buscar()">Buscar</button>

<div id="results"></div>

<script>
const API_KEY = "AIzaSyAhxReFBVs_RO3x7uWbz8CpMbvYAQdvvzc";

async function buscar() {
  document.getElementById("results").innerHTML = "Cargando...";

  let res = await fetch(
    "https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&maxResults=10&key=" + API_KEY
  );

  let data = await res.json();

  let minViews = parseInt(document.getElementById("minViews").value) || 0;
  let minSubs = parseInt(document.getElementById("minSubs").value) || 0;
  let duration = document.getElementById("duration").value;

  let channelIds = data.items.map(v => v.snippet.channelId).join(",");

  let resChannels = await fetch(
    "https://www.googleapis.com/youtube/v3/channels?part=statistics&id=" + channelIds + "&key=" + API_KEY
  );

  let channelData = await resChannels.json();

  let subsMap = {};
  channelData.items.forEach(c => {
    subsMap[c.id] = parseInt(c.statistics.subscriberCount || 0);
  });

  let html = "";

  data.items.forEach(v => {
    let views = parseInt(v.statistics.viewCount);
    let subs = subsMap[v.snippet.channelId] || 0;

    let dur = v.contentDetails.duration;
    let match = dur.match(/PT(\d+H)?(\d+M)?/);
    let horas = match[1] ? parseInt(match[1]) : 0;
    let min = match[2] ? parseInt(match[2]) : 0;
    let totalMin = horas * 60 + min;

    let okDur = true;
    if (duration === "short") okDur = totalMin < 4;
    if (duration === "medium") okDur = totalMin >= 4 && totalMin <= 20;
    if (duration === "long") okDur = totalMin > 20;

    if (views >= minViews && subs >= minSubs && okDur) {
      html += `
        <div style="margin:20px;">
          <h3>${v.snippet.title}</h3>
          <iframe width="300" height="170"
          src="https://www.youtube.com/embed/${v.id}">
          </iframe>
          <p>👁 ${views} | 👤 ${subs}</p>
        </div>
      `;
    }
  });

  document.getElementById("results").innerHTML = html || "No hay resultados";
}
</script>

</body>
  </html>
